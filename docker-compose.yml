version: "3.9"

# Local testnet topology. Keys and tokens are loaded from .env —
# NEVER hardcode secrets here. See .env.example for the required variables.

x-common-env: &common-env
  P2P_TOKEN: ${P2P_TOKEN}
  ADMIN_TOKEN: ${ADMIN_TOKEN}
  RUST_LOG: info
  P2P_ALLOWLIST: ${P2P_ALLOWLIST}
  P2P_REQUIRE_IDENTITY: ${P2P_REQUIRE_IDENTITY}

services:
  bootnode:
    build: .
    container_name: hikmalayer-bootnode
    command: cargo run --release --bin hikmalayer
    environment:
      <<: *common-env
      NODE_ID: bootnode
      VALIDATOR_PRIVATE_KEY: ${BOOTNODE_VALIDATOR_KEY}
      TREASURY_PRIVATE_KEY: ${BOOTNODE_TREASURY_KEY}
    ports:
      - "3000:3000"

  validator1:
    build: .
    container_name: hikmalayer-validator1
    command: cargo run --release --bin hikmalayer
    environment:
      <<: *common-env
      NODE_ID: validator1
      VALIDATOR_PRIVATE_KEY: ${VALIDATOR1_KEY}
      BOOTNODES: http://bootnode:3000
    ports:
      - "3001:3000"

  validator2:
    build: .
    container_name: hikmalayer-validator2
    command: cargo run --release --bin hikmalayer
    environment:
      <<: *common-env
      NODE_ID: validator2
      VALIDATOR_PRIVATE_KEY: ${VALIDATOR2_KEY}
      BOOTNODES: http://bootnode:3000
    ports:
      - "3002:3000"

  validator3:
    build: .
    container_name: hikmalayer-validator3
    command: cargo run --release --bin hikmalayer
    environment:
      <<: *common-env
      NODE_ID: validator3
      VALIDATOR_PRIVATE_KEY: ${VALIDATOR3_KEY}
      BOOTNODES: http://bootnode:3000
    ports:
      - "3003:3000"

  validator4:
    build: .
    container_name: hikmalayer-validator4
    command: cargo run --release --bin hikmalayer
    environment:
      <<: *common-env
      NODE_ID: validator4
      VALIDATOR_PRIVATE_KEY: ${VALIDATOR4_KEY}
      BOOTNODES: http://bootnode:3000
    ports:
      - "3004:3000"

  rpc:
    build: .
    container_name: hikmalayer-rpc
    command: cargo run --release --bin hikmalayer
    environment:
      <<: *common-env
      NODE_ID: rpc
      BOOTNODES: http://bootnode:3000
    ports:
      - "3010:3000"

  json_exporter:
    image: prometheuscommunity/json-exporter:latest
    container_name: hikmalayer-json-exporter
    volumes:
      - ./ops/prometheus/json_exporter.yml:/etc/json_exporter/config.yml:ro
    command:
      - "--config.file=/etc/json_exporter/config.yml"
    ports:
      - "7979:7979"

  prometheus:
    image: prom/prometheus:latest
    container_name: hikmalayer-prometheus
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - json_exporter

  grafana:
    image: grafana/grafana:latest
    container_name: hikmalayer-grafana
    ports:
      - "3005:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      
  caddy:
    image: caddy:latest
    container_name: hikmalayer-caddy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - bootnode

  hikmalayer-exporter:
    image: python:3.11-alpine
    container_name: hikmalayer-exporter
    volumes:
      - ./ops/hikmalayer_exporter.py:/exporter.py:ro
    command: ["sh", "-c", "python3 /exporter.py"]
    ports:
      - "8000:8000"
    depends_on:
      - bootnode

volumes:
  caddy_data:
